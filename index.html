// ==== src/placeholders.jsx ====
// Striped photo placeholders with monospace captions.
// Never hand-drawing imagery; these stand in for lifestyle photography.

const PALETTE = [
  ['#D8C9A8', '#C7B68E'], // warm sand
  ['#A8B8C9', '#8CA0B6'], // cool slate blue
  ['#C4D0BD', '#A9BA9E'], // sage
  ['#D8B8A3', '#C29880'], // terracotta
  ['#B8B1C9', '#9A91B3'], // dusty violet
  ['#CFC1B0', '#B3A38D'], // taupe
  ['#9BB3B6', '#7C989C'], // teal-gray
  ['#E0CBB6', '#CCB193'], // peach-cream
];

function Photo({ caption, seed = 0, ratio = '4/3', style = {}, overlay = null, children }) {
  const [a, b] = PALETTE[seed % PALETTE.length];
  const stripeAngle = 22 + (seed * 17) % 40;
  return (
    <div style={{
      position: 'relative',
      aspectRatio: ratio,
      background: `repeating-linear-gradient(${stripeAngle}deg, ${a}, ${a} 14px, ${b} 14px, ${b} 28px)`,
      borderRadius: 6,
      overflow: 'hidden',
      ...style,
    }}>
      {/* soft vignette */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.18), transparent 60%), linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.18))',
      }} />
      {caption && (
        <div className="mono" style={{
          position: 'absolute', left: 12, bottom: 10,
          fontSize: 10, color: 'rgba(255,255,255,0.92)',
          background: 'rgba(14,23,38,0.55)',
          padding: '4px 8px', borderRadius: 3,
          letterSpacing: '0.04em',
          textTransform: 'uppercase',
        }}>{caption}</div>
      )}
      {overlay}
      {children}
    </div>
  );
}

Object.assign(window, { Photo, PALETTE });

// ==== src/hero.jsx ====
// Hero with rotating word + scrolling photo strip below.

const HERO_WORDS = ['new adventures', 'easier payments', 'more equity', 'real savings'];

function RotatingWord() {
  const [i, setI] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % HERO_WORDS.length), 2400);
    return () => clearInterval(t);
  }, []);
  // measure widest to reserve space
  return (
    <span style={{
      position: 'relative',
      display: 'inline-block',
      verticalAlign: 'baseline',
    }}>
      <span style={{ visibility: 'hidden', whiteSpace: 'nowrap' }}>
        {HERO_WORDS.reduce((a, b) => a.length > b.length ? a : b)}
      </span>
      {HERO_WORDS.map((w, idx) => (
        <span key={idx} className="serif" style={{
          position: 'absolute', left: 0, right: 0, top: 0,
          textAlign: 'center',
          whiteSpace: 'nowrap',
          color: 'var(--accent)',
          opacity: i === idx ? 1 : 0,
          transform: i === idx ? 'translateY(0)' : 'translateY(12px)',
          transition: 'opacity 0.5s, transform 0.5s',
          fontStyle: 'italic',
          fontWeight: 400,
        }}>
          {w}
        </span>
      ))}
      <span style={{
        position: 'absolute', left: 0, right: 0, bottom: -6,
        height: 1, background: 'var(--accent)', opacity: 0.3,
      }}/>
    </span>
  );
}

            <Photo caption={p.caption} seed={p.seed} ratio={p.ratio} />
          </div>
        ))}
      </div>

}

function InlineSelect({ value, options, onChange, width }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef();

  React.useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, []);

  return (
    <span ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        background: 'var(--accent-soft)',
        color: 'var(--accent-ink)',
        border: `1.5px dashed var(--accent)`,
        padding: '2px 14px 4px',
        borderRadius: 6,
        fontSize: 'inherit',
        fontWeight: 500,
        display: 'inline-flex', alignItems: 'center', gap: 8,
        whiteSpace: 'nowrap',
        fontFamily: 'inherit',
      }}>
        {value}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
          style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 8px)', left: 0, zIndex: 30,
          background: 'white', border: '1px solid var(--line)', borderRadius: 10,
          boxShadow: '0 20px 40px -18px rgba(14,23,38,0.25)',
          padding: 6, minWidth: 240,
          animation: 'fadeDown 0.15s ease-out',
        }}>
          {options.map((o, i) => (
            <button key={i} onClick={() => { onChange(o); setOpen(false); }} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '10px 14px', borderRadius: 6,
              fontSize: 15, color: 'var(--ink)',
              background: value === o ? 'var(--bg-2)' : 'transparent',
            }}
            onMouseOver={e => e.currentTarget.style.background = 'var(--bg-2)'}
            onMouseOut={e => e.currentTarget.style.background = value === o ? 'var(--bg-2)' : 'transparent'}
            >
              {o}
            </button>
          ))}
        </div>
      )}
    </span>
  );
}

// Floating chat FAB — persistent, bottom-right, opens a chat panel.

function ChatFab({ label = 'Let’s chat' }) {
  const [open, setOpen] = React.useState(false);
  const [msgs, setMsgs] = React.useState([
    { from: 'bot', text: "Hi — I\u2019m Koa, your Kairos guide. Ask me anything about buying, refinancing, or what you might qualify for." },
  ]);
  const [input, setInput] = React.useState('');

  const send = () => {
    if (!input.trim()) return;
    setMsgs(m => [...m, { from: 'you', text: input }]);
    const u = input;
    setInput('');
    setTimeout(() => {
      setMsgs(m => [...m, { from: 'bot', text: `Got it — a licensed advisor will follow up on "${u.slice(0, 40)}${u.length>40?'\u2026':''}". In the meantime, you can see a rough affordability range in about 3 minutes.` }]);
    }, 900);
  };

  return (
    <>
      {open && (
        <div style={{
          position: 'fixed', bottom: 100, right: 28, zIndex: 200,
          width: 360, maxWidth: 'calc(100vw - 40px)',
          background: 'white',
          border: '1px solid var(--line)',
          borderRadius: 16,
          boxShadow: '0 30px 60px -20px rgba(14,23,38,0.3)',
          overflow: 'hidden',
          display: 'flex', flexDirection: 'column',
          maxHeight: 540,
          animation: 'chatIn 0.22s ease-out',
        }}>
          <style>{`@keyframes chatIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }`}</style>
          <div style={{
            padding: '16px 18px',
            background: 'var(--ink)', color: 'var(--bg)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'var(--accent)', display: 'grid', placeItems: 'center', fontWeight: 600 }}>K</div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 500 }}>Chat with Koa</div>
                <div className="mono" style={{ fontSize: 10, color: 'rgba(247,245,241,0.55)', letterSpacing: '0.05em', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'oklch(0.72 0.18 150)' }}/>
                  Live · typical reply &lt; 2 min
                </div>
              </div>
            </div>
            <button onClick={() => setOpen(false)} style={{ color: 'rgba(247,245,241,0.8)', padding: 4 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 10, background: 'var(--bg)' }}>
            {msgs.map((m, i) => (
              <div key={i} style={{
                alignSelf: m.from === 'you' ? 'flex-end' : 'flex-start',
                background: m.from === 'you' ? 'var(--accent)' : 'white',
                color: m.from === 'you' ? 'white' : 'var(--ink)',
                padding: '10px 14px',
                borderRadius: m.from === 'you' ? '14px 14px 3px 14px' : '14px 14px 14px 3px',
                fontSize: 14, lineHeight: 1.45,
                maxWidth: '82%',
                border: m.from === 'you' ? 'none' : '1px solid var(--line)',
              }}>{m.text}</div>
            ))}
          </div>
          <div style={{ padding: 12, borderTop: '1px solid var(--line)', display: 'flex', gap: 8, background: 'white' }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()}
              placeholder="Type a message"
              style={{
                flex: 1, padding: '10px 12px',
                border: '1px solid var(--line)', borderRadius: 10,
                fontSize: 14, fontFamily: 'inherit',
                outline: 'none',
              }}
            />
            <button onClick={send} style={{
              padding: '0 14px', background: 'var(--ink)', color: 'var(--bg)',
              borderRadius: 10, fontSize: 13, fontWeight: 500,
            }}>Send</button>
          </div>
        </div>
      )}

      <button onClick={() => setOpen(o => !o)} style={{
        position: 'fixed', bottom: 28, right: 28, zIndex: 200,
        background: 'var(--accent)', color: 'white',
        padding: '14px 20px 14px 16px',
        borderRadius: 999,
        display: 'inline-flex', alignItems: 'center', gap: 10,
        boxShadow: '0 16px 32px -12px rgba(14,23,38,0.4)',
        fontSize: 14, fontWeight: 500,
        transition: 'all 0.15s',
      }}
      onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.background = 'var(--accent-2)'; }}
      onMouseOut={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.background = 'var(--accent)'; }}

        {label}
      </button>
    </>
  );
}

// App composition.

function App() {
  const [tweaks, setTweaks] = React.useState(() => ({ ...window.__TWEAKS }));
  const [tweakMode, setTweakMode] = React.useState(false);

  React.useEffect(() => {
    // apply tweaks to CSS vars
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--accent-2', tweaks.accentColor);
    document.documentElement.style.setProperty('--accent-ink', tweaks.accentColor);
    document.body.style.background = tweaks.bgColor;
    document.documentElement.style.setProperty('--bg', tweaks.bgColor);
  }, [tweaks.accentColor, tweaks.bgColor]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <div>
      <Nav />
      <main>
        <Hero tweaks={tweaks} />
        <PillTabs />
        <GoalCards />
        <Builder />
        <Calculator />
        <Testimonials />
      </main>
      <Footer />
      <ChatFab label={tweaks.chatLabel} />
      {tweakMode && <TweaksPanel tweaks={tweaks} update={update} />}
    </div>
  );
}
