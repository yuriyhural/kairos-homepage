  --bg: #F7F5F1;
  --bg-2: #EFECE5;

  --ink-2: #2A3444;

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); font-family: 'Geist', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

// ============ PLACEHOLDERS ============
const PALETTE = [
  ['#D8C9A8', '#C7B68E'], ['#A8B8C9', '#8CA0B6'], ['#C4D0BD', '#A9BA9E'],
  ['#D8B8A3', '#C29880'], ['#B8B1C9', '#9A91B3'], ['#CFC1B0', '#B3A38D'],
  ['#9BB3B6', '#7C989C'], ['#E0CBB6', '#CCB193'],
];
function Photo({ caption, seed = 0, ratio = '4/3', style = {} }) {
  const [a, b] = PALETTE[seed % PALETTE.length];
  const angle = 22 + (seed * 17) % 40;
  return (
    <div style={{
      position: 'relative', aspectRatio: ratio,
      background: `repeating-linear-gradient(${angle}deg, ${a}, ${a} 14px, ${b} 14px, ${b} 28px)`,
      borderRadius: 8, overflow: 'hidden', ...style,
    }}>
      <div style={{ position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.18), transparent 60%), linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.18))' }}/>
      {caption && <div className="mono" style={{
        position: 'absolute', left: 12, bottom: 10, fontSize: 10,
        color: 'rgba(255,255,255,0.92)', background: 'rgba(14,23,38,0.55)',
        padding: '4px 8px', borderRadius: 3, textTransform: 'uppercase', letterSpacing: '0.04em',
      }}>{caption}</div>}
    </div>
  );
}

// ============ NAV ============
function Logo() {
  return (
    <a href="index.html" style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--ink)', display: 'grid', placeItems: 'center' }}>
        <div style={{ width: '58%', height: '58%', borderRadius: '50%', background: 'var(--bg)', position: 'relative' }}>
          <div style={{ position: 'absolute', top: '50%', left: '10%', right: '10%', height: 1.5, background: 'var(--ink)', transform: 'translateY(-50%) rotate(-28deg)', transformOrigin: 'left center' }}/>
          <div style={{ position: 'absolute', top: '50%', left: '50%', width: 4, height: 4, borderRadius: '50%', background: 'var(--accent)', transform: 'translate(-50%,-50%)' }}/>
        </div>
      </div>
      <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>Kairos</div>
    </a>
  );
}
function Nav() {
  return (
    <header style={{ position: 'sticky', top: 0, zIndex: 90, background: 'var(--bg)', borderBottom: '1px solid var(--line)' }}>
      <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72, gap: 24 }}>
        <Logo />
        <nav style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          {['Buy', 'Refinance', 'Rates'].map(k => (
            <button key={k} style={{ padding: '10px 18px', fontSize: 15, fontWeight: 500, borderRadius: 6, display: 'flex', alignItems: 'center', gap: 6 }}>
              {k}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          ))}
        </nav>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20, fontSize: 13 }}>
          <a href="tel:+10000000000" style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--ink-2)' }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            <span className="mono">(000) 000-0000</span>
          </a>
          <a href="#" style={{ color: 'var(--ink-2)' }}>Sign in</a>
          <button style={{ background: 'var(--accent)', color: 'white', padding: '11px 20px', borderRadius: 999, fontSize: 14, fontWeight: 500 }}>Apply now</button>
        </div>
      </div>
    </header>
  );
}

// ============ BREADCRUMB ============
function Breadcrumb() {
  return (
    <div className="container" style={{ paddingTop: 24, paddingBottom: 8 }}>
      <div className="mono" style={{ fontSize: 12, color: 'var(--muted)', letterSpacing: '0.04em' }}>
        <a href="index.html" style={{ color: 'var(--ink-2)' }}>Home</a>
        <span style={{ margin: '0 10px' }}>/</span>
        <span>Calculators</span>
      </div>
    </div>
  );
}

// ============ PAGE HEADER ============
function PageHeader() {
  return (
    <section style={{ paddingTop: 40, paddingBottom: 48 }}>
      <div className="container">
        <h1 style={{ fontSize: 'clamp(42px, 6vw, 76px)', fontWeight: 500, lineHeight: 1.02, letterSpacing: '-0.03em', maxWidth: 880 }}>
          Kairos <span className="serif" style={{ color: 'var(--accent)' }}>calculators</span>.
        </h1>
        <p style={{ fontSize: 20, color: 'var(--muted)', marginTop: 20, maxWidth: 620, lineHeight: 1.5 }}>
          Let's look at the numbers to discover what's possible.

      </div>

}

// ============ WIZARD ============
const WIZARD_STEPS = [
  { key: 'owns', q: 'Do you currently own a home?', options: ['Yes', 'No'], seed: 0 },
  { key: 'dream', q: 'Which homeownership dream are you working toward?', options: ['Buying a house', 'Options for my current home'], seed: 2 },
  { key: 'focus', q: 'What do you want to feel more confident about?', options: ['What home price I can afford', 'Monthly payment', 'Down payment options'], seed: 3 },
  { key: 'credit', q: "What's your credit profile?", options: ['Less than 580', '580-619', '620-659', '660-719', '720+'], seed: 5 },
  { key: 'zip', q: 'What ZIP code are you looking in?', input: true, seed: 7 },
];

function recommend(answers) {
  const { owns, dream, focus } = answers;
  const pool = [];
  if (focus === 'What home price I can afford') pool.push('Home affordability calculator', 'Mortgage calculator', 'Down payment calculator');
  if (focus === 'Monthly payment') pool.push('Mortgage calculator', 'Amortization calculator', 'Mortgage payoff calculator');
  if (focus === 'Down payment options') pool.push('Down payment calculator', 'Home affordability calculator', 'Rent vs. buy calculator');
  if (owns === 'Yes' || dream === 'Options for my current home') pool.push('Refinance calculator', 'Home equity calculator', 'Mortgage payoff calculator');
  if (dream === 'Buying a house') pool.push('Rent vs. buy calculator', 'Home affordability calculator');
  const seen = new Set();
  return pool.filter(x => !seen.has(x) && seen.add(x)).slice(0, 3);
}

function Wizard() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [zip, setZip] = useState('');
  const [done, setDone] = useState(false);

  const current = WIZARD_STEPS[step];
  const answered = current.input ? zip.length >= 5 : !!answers[current.key];

  const next = () => {
    if (current.input) setAnswers(a => ({ ...a, zip }));
    if (step === WIZARD_STEPS.length - 1) setDone(true);
    else setStep(s => s + 1);
  };
  const back = () => { if (step > 0) setStep(s => s - 1); };
  const reset = () => { setStep(0); setAnswers({}); setZip(''); setDone(false); };

  const pick = (opt) => setAnswers(a => ({ ...a, [current.key]: opt }));

  const recs = done ? recommend(answers) : [];

  return (
    <section style={{ paddingTop: 32, paddingBottom: 80 }}>
      <div className="container">
        <div style={{ marginBottom: 28 }}>
          <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>
            § Quick quiz
          </div>
          <h2 style={{ fontSize: 36, fontWeight: 500, letterSpacing: '-0.02em', lineHeight: 1.1 }}>
            Not sure which calculator to use?
          </h2>
        </div>

        <div style={{
          background: 'white', border: '1px solid var(--line)', borderRadius: 16,
          overflow: 'hidden', display: 'grid', gridTemplateColumns: '1.2fr 1fr',
        }}>
          <div style={{ padding: 48, minHeight: 480, display: 'flex', flexDirection: 'column' }}>
            {!done ? (
              <>
                {/* progress */}
                <div style={{ display: 'flex', gap: 6, marginBottom: 28 }}>
                  {WIZARD_STEPS.map((_, i) => (
                    <div key={i} style={{
                      flex: 1, height: 3, borderRadius: 2,
                      background: i <= step ? 'var(--accent)' : 'var(--line)',
                      transition: 'background 0.3s',
                    }}/>
                  ))}
                </div>
                <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>
                  Step {step + 1} of {WIZARD_STEPS.length}
                </div>
                <h3 style={{ fontSize: 28, fontWeight: 500, letterSpacing: '-0.015em', lineHeight: 1.2, marginBottom: 28 }}>
                  {current.q}
                </h3>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
                  {current.input ? (
                    <input
                      value={zip}
                      onChange={e => setZip(e.target.value.replace(/\D/g, '').slice(0, 5))}
                      placeholder="e.g. 94103"
                      style={{
                        padding: '16px 18px', fontSize: 18,
                        border: '1.5px solid var(--line-2)', borderRadius: 10,
                        fontFamily: 'inherit', outline: 'none', letterSpacing: '0.08em',
                        maxWidth: 260,
                      }}
                      onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                      onBlur={e => e.target.style.borderColor = 'var(--line-2)'}
                    />
                  ) : (
                    current.options.map(o => {
                      const picked = answers[current.key] === o;
                      return (
                        <button key={o} onClick={() => pick(o)} style={{
                          padding: '14px 18px', textAlign: 'left',
                          border: picked ? '1.5px solid var(--accent)' : '1.5px solid var(--line-2)',
                          borderRadius: 10, fontSize: 15, fontWeight: 500,
                          background: picked ? 'var(--accent-soft)' : 'white',
                          color: picked ? 'var(--accent-ink)' : 'var(--ink)',
                          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                          transition: 'all 0.15s',
                        }}>
                          {o}
                          <span style={{
                            width: 18, height: 18, borderRadius: '50%',
                            border: picked ? '5px solid var(--accent)' : '1.5px solid var(--line-2)',
                            background: 'white',
                          }}/>
                        </button>
                      );
                    })
                  )}
                </div>

                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 32, paddingTop: 24, borderTop: '1px solid var(--line)' }}>
                  <button onClick={back} disabled={step === 0} style={{
                    padding: '12px 22px', fontSize: 14, fontWeight: 500,
                    color: step === 0 ? 'var(--line-2)' : 'var(--ink-2)',
                    cursor: step === 0 ? 'not-allowed' : 'pointer',
                  }}>← Back</button>
                  <button onClick={next} disabled={!answered} style={{
                    padding: '12px 24px', fontSize: 14, fontWeight: 500,
                    background: answered ? 'var(--accent)' : 'var(--line)',
                    color: answered ? 'white' : 'var(--muted)',
                    borderRadius: 999,
                    cursor: answered ? 'pointer' : 'not-allowed',
                    display: 'inline-flex', alignItems: 'center', gap: 8,
                  }}>
                    {step === WIZARD_STEPS.length - 1 ? 'See my matches' : 'Next'}
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                  </button>
                </div>
              </>
            ) : (
              <div>
                <div className="mono" style={{ fontSize: 11, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 14 }}>
                  Your best matches
                </div>
                <h3 style={{ fontSize: 28, fontWeight: 500, letterSpacing: '-0.015em', lineHeight: 1.2, marginBottom: 28 }}>
                  Start with these {recs.length} calculators.
                </h3>
                <ol style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {recs.map((r, i) => (
                    <li key={r} style={{
                      display: 'flex', alignItems: 'center', gap: 16,
                      padding: '16px 18px', background: 'var(--bg-2)', borderRadius: 10,
                    }}>
                      <span className="serif" style={{ fontSize: 32, color: 'var(--accent)', width: 28, textAlign: 'center' }}>{i + 1}</span>
                      <span style={{ fontSize: 16, fontWeight: 500, flex: 1 }}>{r}</span>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: 'var(--ink-2)' }}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </li>
                  ))}
                </ol>
                <button onClick={reset} style={{
                  marginTop: 28, fontSize: 14, color: 'var(--muted)',
                  textDecoration: 'underline',
                }}>
                  Start over
                </button>
              </div>
            )}
          </div>
          <div style={{ position: 'relative', background: 'var(--bg-2)' }}>
            <Photo caption={done ? 'Keys · welcome home' : `Step ${step + 1} / ${WIZARD_STEPS.length}`} seed={done ? 4 : current.seed} ratio="auto" style={{ position: 'absolute', inset: 0, borderRadius: 0 }}/>
          </div>
        </div>
      </div>
    </section>
  );
}

// ============ CALCULATOR GRID ============
const CALCS = [
  { name: 'Home affordability calculator', desc: 'See what home price fits your income, debts, and savings.', cat: 'Buy', cta: 'See what you could get prequalified for' },
  { name: 'Mortgage calculator', desc: 'Estimate your monthly principal, interest, taxes, and insurance.', cat: 'Buy', cta: 'Calculate my payment' },
  { name: 'Refinance calculator', desc: 'Find out when refinancing clears the break-even math.', cat: 'Refinance', cta: 'See my refi options' },
  { name: 'Rent vs. buy calculator', desc: 'Compare renting to owning over the years you plan to stay.', cat: 'Buy', cta: 'Compare the numbers' },
  { name: 'Amortization calculator', desc: 'Watch interest fall and principal climb over the life of the loan.', cat: 'Buy', cta: 'Build my schedule' },
  { name: 'Home equity calculator', desc: 'Estimate the equity you have built and could potentially tap.', cat: 'Refinance', cta: 'Estimate my equity' },
  { name: 'Mortgage payoff calculator', desc: 'See how extra payments shorten your term and save interest.', cat: 'Refinance', cta: 'Plan my payoff' },
  { name: 'Down payment calculator', desc: 'Plan your savings timeline and see what sizes unlock which loans.', cat: 'Buy', cta: 'Plan my down payment' },
];

function CalculatorGrid() {
  const [filter, setFilter] = useState('All');
  const filters = ['All', 'Buy a home', 'Refinance'];
  const filtered = CALCS.filter(c => {
    if (filter === 'All') return true;
    if (filter === 'Buy a home') return c.cat === 'Buy';
    if (filter === 'Refinance') return c.cat === 'Refinance';
    return true;
  });

  return (
    <section style={{ paddingTop: 40, paddingBottom: 96, background: 'var(--bg-2)' }}>
      <div className="container">
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 32, flexWrap: 'wrap', gap: 24, paddingTop: 40 }}>
          <div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 14 }}>
              § All calculators
            </div>
            <h2 style={{ fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', lineHeight: 1.05 }}>
              Run the numbers, <span className="serif" style={{ color: 'var(--accent)' }}>your way</span>.
            </h2>
          </div>
          <div style={{ display: 'inline-flex', padding: 4, background: 'white', border: '1px solid var(--line)', borderRadius: 999 }}>
            {filters.map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                padding: '9px 18px', borderRadius: 999, fontSize: 13, fontWeight: 500,
                background: filter === f ? 'var(--ink)' : 'transparent',
                color: filter === f ? 'var(--bg)' : 'var(--ink-2)',
                transition: 'all 0.2s',
              }}>
                {f}
              </button>
            ))}
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
          {filtered.map(c => (
            <a key={c.name} href="#" style={{
              background: 'white', border: '1px solid var(--line)', borderRadius: 14,
              padding: 22, display: 'flex', flexDirection: 'column',
              transition: 'transform 0.15s, box-shadow 0.15s',
            }}
            onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = '0 20px 40px -24px rgba(14,23,38,0.18)'; }}
            onMouseOut={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
            >
              <div style={{
                width: 40, height: 40, borderRadius: 10, background: 'var(--accent-soft)',
                display: 'grid', placeItems: 'center', marginBottom: 18,
                color: 'var(--accent)',
              }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="4" y="3" width="16" height="18" rx="2"/>
                  <line x1="8" y1="7" x2="16" y2="7"/>
                  <line x1="8" y1="11" x2="10" y2="11"/><line x1="12" y1="11" x2="14" y2="11"/><line x1="15" y1="11" x2="16" y2="11"/>
                  <line x1="8" y1="15" x2="10" y2="15"/><line x1="12" y1="15" x2="14" y2="15"/>
                </svg>
              </div>
              <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>
                {c.cat === 'Buy' ? 'Buy a home' : 'Refinance'}
              </div>
              <h3 style={{ fontSize: 17, fontWeight: 500, letterSpacing: '-0.01em', lineHeight: 1.2 }}>
                {c.name}
              </h3>
              <p style={{ fontSize: 13, color: 'var(--muted)', marginTop: 10, lineHeight: 1.5, flex: 1 }}>
                {c.desc}
              </p>
              <div style={{ marginTop: 18, display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 500, color: 'var(--accent)' }}>
                {c.cta}
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

// ============ RELATED ARTICLES ============
const ARTICLES = [
  { tag: 'Guide', read: '7 min read', title: 'How to read a mortgage calculator without getting fooled', seed: 1 },
  { tag: 'Explainer', read: '4 min read', title: 'Break-even math: when refinancing actually starts paying off', seed: 2 },
  { tag: 'Checklist', read: '5 min read', title: 'Down payment, closing costs, reserves — what you really need saved', seed: 4 },
];
function Articles() {
  return (
    <section style={{ paddingTop: 80, paddingBottom: 72 }}>
      <div className="container">
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 32, flexWrap: 'wrap', gap: 20 }}>
          <h2 style={{ fontSize: 36, fontWeight: 500, letterSpacing: '-0.02em', lineHeight: 1.1 }}>
            Related articles.
          </h2>
          <a href="#" style={{ fontSize: 14, fontWeight: 500, color: 'var(--ink-2)', borderBottom: '1px solid var(--ink-2)', paddingBottom: 2 }}>
            Read all articles →
          </a>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {ARTICLES.map(a => (
            <a key={a.title} href="#" style={{
              background: 'white', border: '1px solid var(--line)', borderRadius: 14,
              overflow: 'hidden', display: 'flex', flexDirection: 'column',
              transition: 'transform 0.2s, box-shadow 0.2s',
            }}
            onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = '0 20px 40px -24px rgba(14,23,38,0.18)'; }}
            onMouseOut={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
            >
              <Photo caption={`[Article — placeholder]`} seed={a.seed} ratio="16/10" style={{ borderRadius: 0 }}/>
              <div style={{ padding: 22, flex: 1, display: 'flex', flexDirection: 'column' }}>
                <div className="mono" style={{ fontSize: 10, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>
                  {a.tag} · {a.read}
